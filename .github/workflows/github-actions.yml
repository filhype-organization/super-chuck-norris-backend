name: Chuck Norris action

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test

  native-compile-arm64:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      id: ${{ steps.artifact-upload-step.outputs.artifact-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y binfmt-support qemu-user-static

      - name: Compilation
        run: |
          mvn clean package \
          -Dnative -DskipTests \
          -Dquarkus.native.container-build=true \
          -Dquarkus.native.container-runtime-options=--platform=linux/arm64 \
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-${{ vars.JAVA_VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-arm64
          path: target

  native-compile-x86:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      id: ${{ steps.artifact-upload-step.outputs.artifact-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y binfmt-support qemu-user-static

      - name: Compilation
        run: |
          mvn clean package \
          -Dnative -DskipTests \
          -Dquarkus.native.container-build=true \
          -Dquarkus.native.container-runtime-options=--platform=linux/amd64 \
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-${{ vars.JAVA_VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-x86
          path: target

  build-docker:
    needs: [ native-compile-x86, native-compile-arm64 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pom.xml
        run: |
          version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$version" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.LOGIN_DOCKER_HUB }}
          password: ${{ secrets.TOKEN_DOCKER_HUB }}

      - uses: actions/download-artifact@v4
        with:
          name: artifact-x86
          path: target

      - name: Build x86 image
        uses: docker/build-push-action@v6
        with:
          context: ./target/
          file: ./src/main/docker/Dockerfile.native-micro
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-x86

      - uses: actions/download-artifact@v4
        with:
          name: artifact-arm64
          path: target

      - name: Build arm64 image
        uses: docker/build-push-action@v6
        with:
          context: ./target/
          file: ./src/main/docker/Dockerfile.native-micro
          platforms: linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-arm64


      - name: Create and push manifest
        run: |
          DIGEST_X86=$(docker manifest inspect ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-x86 | jq -r '.manifests[] | select(.platform.architecture=="amd64").digest')
          DIGEST_ARM64=$(docker manifest inspect ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-arm64 | jq -r '.manifests[] | select(.platform.architecture=="arm64").digest')
          
          docker manifest create ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }} \
          ${{ vars.DOCKER_IMAGE_NAME }}@${DIGEST_X86} \
          ${{ vars.DOCKER_IMAGE_NAME }}@${DIGEST_ARM64}
          
          docker manifest push ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}

      - name: Delete intermediate tags
        run: |
          # Authentification
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{\"username\": \"${{ secrets.LOGIN_DOCKER_HUB }}\", \"password\": \"${{ secrets.TOKEN_DOCKER_HUB }}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          # Extraction du namespace et du repository
          IFS='/' read -r NAMESPACE REPO <<< "${{ vars.DOCKER_IMAGE_NAME }}"
          
          # Supprimer les tags
          curl -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO}/tags/${{ env.version }}-x86/"
          
          curl -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO}/tags/${{ env.version }}-arm64/"