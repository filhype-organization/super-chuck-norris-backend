name: Chuck Norris action

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test


  native-compile-arm64:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      id: ${{ steps.artifact-upload-step.outputs.artifact-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y binfmt-support qemu-user-static

      - name: Compilation
        run: |
          mvn clean package \
          -Dnative -DskipTests \
          -Dquarkus.native.container-build=true \
          -Dquarkus.native.container-runtime-options=--platform=linux/arm64 \
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-${{ vars.JAVA_VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-arm64
          path: target

  native-compile-x86:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      id: ${{ steps.artifact-upload-step.outputs.artifact-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y binfmt-support qemu-user-static

      - name: Compilation
        run: |
          mvn clean package \
          -Dnative -DskipTests \
          -Dquarkus.native.container-build=true \
          -Dquarkus.native.container-runtime-options=--platform=linux/amd64 \
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-${{ vars.JAVA_VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-x86
          path: target

  build-docker:
    needs: [ native-compile-arm64, native-compile-x86 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get tage version
        run: |
          # Extraction de la version de base depuis le tag
          BASE_VERSION=${GITHUB_REF#refs/tags/v}
          
          # Récupération de la branche courante
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          
          # Ajout de -SNAPSHOT si la branche n'est pas main
          if [ "$BRANCH_NAME" != "main" ]; then
            echo "version=${BASE_VERSION}-SNAPSHOT" >> $GITHUB_ENV
          else
            echo "version=${BASE_VERSION}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.LOGIN_DOCKER_HUB }}
          password: ${{ secrets.TOKEN_DOCKER_HUB }}

      - uses: actions/download-artifact@v4
        with:
          name: artifact-x86
          path: target

      - name: Build x86 image
        uses: docker/build-push-action@v6
        with:
          context: ./target/
          file: ./src/main/docker/Dockerfile.native-micro
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-x86

      - uses: actions/download-artifact@v4
        with:
          name: artifact-arm64
          path: target

      - name: Build arm64 image
        uses: docker/build-push-action@v6
        with:
          context: ./target/
          file: ./src/main/docker/Dockerfile.native-micro
          platforms: linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-arm64


      - name: Create and push manifest
        run: |
          DIGEST_X86=$(docker manifest inspect ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-x86 | jq -r '.manifests[] | select(.platform.architecture=="amd64").digest')
          DIGEST_ARM64=$(docker manifest inspect ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}-arm64 | jq -r '.manifests[] | select(.platform.architecture=="arm64").digest')
          
          docker manifest create ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }} \
          ${{ vars.DOCKER_IMAGE_NAME }}@${DIGEST_X86} \
          ${{ vars.DOCKER_IMAGE_NAME }}@${DIGEST_ARM64}
          
          docker manifest push ${{ vars.DOCKER_IMAGE_NAME }}:${{ env.version }}

      - name: Delete intermediate tags
        run: |
          # Authentification
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{\"username\": \"${{ secrets.LOGIN_DOCKER_HUB }}\", \"password\": \"${{ secrets.TOKEN_DOCKER_HUB }}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          # Extraction du namespace et du repository
          IFS='/' read -r NAMESPACE REPO <<< "${{ vars.DOCKER_IMAGE_NAME }}"
          
          # Supprimer les tags
          curl -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO}/tags/${{ env.version }}-x86/"
          
          curl -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO}/tags/${{ env.version }}-arm64/"

  codacy-analysis-cli:
    name: Codacy Analysis CLI
    needs: [ build-docker ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master

  super-linter:
    name: Lint
    needs: [ build-docker ]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      # To report GitHub Actions status checks
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      - name: Super-linter
        uses: super-linter/super-linter@v7.4.0 # x-release-please-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sql-lint:
    name: runner / sqlfluff (github-check)
    needs: [ build-docker ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yu-iskw/action-sqlfluff@v4
        id: lint-sql
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          sqlfluff_version: "3.3.1"
          sqlfluff_command: "fix" # Or "lint"
          config: "${{ github.workspace }}/.sqlfluff"
          paths: "${{ github.workspace }}/models"
      - name: "Show outputs (Optional)"
        shell: bash
        run: |
          echo '${{ steps.lint-sql.outputs.sqlfluff-results }}' | jq -r '.'
          echo '${{ steps.lint-sql.outputs.sqlfluff-results-rdjson }}' | jq -r '.'

  secret_detection:
    runs-on: ubuntu-latest
    needs: [ codacy-analysis-cli ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown