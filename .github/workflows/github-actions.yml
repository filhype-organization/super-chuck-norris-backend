name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    uses: filhype-organization/universal-devops-action/.github/workflows/github-actions.yml@597db2c6c5c4f12aaee70582eea690253a69621f
    with:
      build_platforms: '["amd64","arm64"]'
      build_type: 'native'
      container_build: true
      docker_image_name: 'leeson77/chuck-norris-backend'
      enable_java_build: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.LOGIN_DOCKER_HUB }}
      DOCKER_TOKEN: ${{ secrets.TOKEN_DOCKER_HUB }}