  build-docker:
    needs: [ native-compile-x86, native-compile-arm64 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pom.xml
        run: |
          version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$version" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.LOGIN_DOCKER_HUB }}
          password: ${{ secrets.TOKEN_DOCKER_HUB }}

      - uses: actions/download-artifact@v4
        with:
          name: artifact-x86
          path: target

      - name: Build and push x86
        uses: docker/build-push-action@v6
        with:
          context: ./target/
          file: ./src/main/docker/Dockerfile.native-micro-x86
          platforms: linux/amd64
          push: true
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.version }}-x86

      - uses: actions/download-artifact@v4
        with:
          name: artifact-arm64
          path: target

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: ./target/
          file: ./src/main/docker/Dockerfile.native-micro-arm64
          platforms: linux/arm64
          push: true
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.version }}-arm64

      - name: Create and push manifest
        run: |
          # Récupérer les digests des images
          X86_DIGEST=$(docker inspect ${{ env.IMAGE_NAME }}:${{ env.version }}-x86 --format='{{index .RepoDigests 0}}')
          ARM64_DIGEST=$(docker inspect ${{ env.IMAGE_NAME }}:${{ env.version }}-arm64 --format='{{index .RepoDigests 0}}')
          
          # Supprimer l'ancien manifest
          docker manifest rm ${{ env.IMAGE_NAME }}:${{ env.version }} || true
          
          # Créer le nouveau manifest avec les digests
          docker manifest create ${{ env.IMAGE_NAME }}:${{ env.version }} \
            --amend "${X86_DIGEST}" \
            --amend "${ARM64_DIGEST}"
          
          # Vérifier et pousser
          docker manifest inspect ${{ env.IMAGE_NAME }}:${{ env.version }}
          docker manifest push --purge ${{ env.IMAGE_NAME }}:${{ env.version }}