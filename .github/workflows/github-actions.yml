name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    uses: filhype-organization/universal-devops-action/.github/workflows/github-actions.yml@main
    with:
      build_platforms: '["amd64", "arm64"]'
      build_type: 'native'
      container_build: true
      docker_image_name: 'leeson77/chuck-norris-backend'
      enable_java_build: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.LOGIN_DOCKER_HUB }}
      DOCKER_TOKEN: ${{ secrets.TOKEN_DOCKER_HUB }}

  update-iac:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout IaC repo
        uses: actions/checkout@v4
        with:
          repository: filhype-organization/iac-chucknorris-backend
          token: ${{ secrets.IAC_REPO_TOKEN }}

      - name: Update image tag in deployment manifest
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE_TAG="${SHORT_SHA}-snapshot-arm64"
          sed -i "s|leeson77/chuck-norris-backend:.*|leeson77/chuck-norris-backend:${IMAGE_TAG} # {\"\\$imagepolicy\": \"flux-system:chuck-norris-backend\"}|" \
            deploy/deployment.yaml

      - name: Commit and push
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE_TAG="${SHORT_SHA}-snapshot-arm64"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "chore: deploy backend image ${IMAGE_TAG} [skip ci]"
          git push