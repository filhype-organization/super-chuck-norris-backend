%dev,test.quarkus.hibernate-orm.sql-load-script=chuck_norris_db.sql
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:4200
%dev.quarkus.http.cors.methods=GET,POST,PUT
%dev.quarkus.http.cors.headers=Content-Type,Authorization
%dev.quarkus.http.cors.exposed-headers=X-Custom-Header
%dev.quarkus.http.cors.access-control-allow-credentials=true
%dev.quarkus.http.cors.access-control-max-age=24H

%dev.quarkus.keycloak.devservices.port=8180

%prod.quarkus.oidc.auth-server-url=http://localhost:8180/realms/quarkus
%dev.quarkus.oidc.client-id=backend-service
%dev.quarkus.oidc.credentials.secret=secret
%dev.quarkus.oidc.application-type=service
%dev.quarkus.oidc.token.issuer=http://localhost:8180/realms/quarkus

%dev.mp.jwt.verify.publickey.location=http://localhost:8180/realms/quarkus/protocol/openid-connect/certs

# Configuration des chemins publics et protégés
%dev.quarkus.http.auth.permission.public.paths=/api/jokes/v1/*
%dev.quarkus.http.auth.permission.public.policy=permit
%dev.quarkus.http.auth.permission.public.methods=GET

# Configuration des chemins authentifiés
%dev.quarkus.http.auth.permission.authenticated.paths=/api/jokes/v1/*
%dev.quarkus.http.auth.permission.authenticated.policy=authenticated
%dev.quarkus.http.auth.permission.authenticated.methods=POST,PUT,DELETE

# logging
#%dev.quarkus.log.category."io.quarkus.smallrye.jwt.runtime.auth.MpJwtValidator".level=TRACE
#%dev.quarkus.log.category."io.quarkus.smallrye.jwt.runtime.auth.MpJwtValidator".min-level=TRACE
#%dev.quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG
#%dev.quarkus.rest-client.logging.scope=request-response
#%dev.quarkus.rest-client.logging.body-limit=500
